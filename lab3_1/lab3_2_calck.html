<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
    button{
        width: 100px;
        height: 100px;
        background: #d2d2d2;
        color: rgb(0, 0, 0);
        border: 1px;
        font-size: auto;
        font-weight: auto;
        padding: 0px 0px;
        text-align: auto;
        cursor: pointer;
        transition: background 0.5s, transform 0.05s;
    } 
    .calck{
        width: auto;
        height: auto;
        background: #b60e0e11;
        color: rgb(0, 0, 0);
        border: 1px;
        font-size: auto;
        font-weight: auto;
        padding: 0px 0px;
        text-align: auto;
    }
    th{
        width: 100px;
        height: 100px;
        background: #d2d2d2;
        color: rgb(0, 0, 0);
        border: 1px;
        margin-bottom: 100px;
        margin-top: 100px;
        font-size: auto;
        font-weight: auto;
        text-align: right;
        padding: 0px 50px;

    }
    </style>
    
</head>
<body>
    <div class="calck">
        
    <table>
        <thead> <th colspan="4"><span id="pole"> 0 </span> </th> </thead>
